<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vedic Astrology Report</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');

    @page {
        size: A4;
        margin: 24mm 20mm 24mm 20mm;
        @bottom-right {
            content: counter(page);
            font-family: 'Inter', sans-serif;
            font-size: 8.5pt;
            font-weight: 500;
            color: #a0a0a0;
        }
        @bottom-left {
            content: "Cosmic Hub — Personal Astrological Blueprint";
            font-family: 'Inter', sans-serif;
            font-size: 8.5pt;
            font-weight: 500;
            color: #a0a0a0;
        }
    }

    body {
        font-family: 'Inter', sans-serif;
        font-size: 10.5pt;
        line-height: 1.6;
        color: #2b2b2b;
        background-color: #ffffff;
        margin: 0;
        padding: 0;
    }

    /* Cover Page */
    .cover-page {
        page-break-after: always;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-top: 40mm;
        box-sizing: border-box;
    }

    .cover-title {
        font-family: 'Playfair Display', serif;
        font-size: 38pt;
        font-weight: 700;
        line-height: 1.15;
        color: #1a1a1a;
        margin: 0 0 4mm 0;
    }

    .cover-subtitle {
        font-family: 'Inter', sans-serif;
        font-size: 13pt;
        font-weight: 300;
        color: #666666;
        margin: 0 0 25mm 0;
        letter-spacing: 0.5px;
    }

    .cover-meta-box {
        border-top: 1px solid #e0e0e0;
        padding-top: 8mm;
        margin-top: auto;
    }

    .meta-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6mm 12mm;
    }

    .meta-item {
        font-size: 9.5pt;
        color: #4a4a4a;
    }

    .meta-label {
        font-weight: 600;
        color: #888888;
        text-transform: uppercase;
        font-size: 7.5pt;
        letter-spacing: 0.8px;
        margin-bottom: 1mm;
    }

    .meta-value {
        font-weight: 500;
        color: #1a1a1a;
    }

    /* Content Layout */
    .content-section {
        padding-top: 4mm;
    }

    h1, h2, h3, h4 {
        color: #1a1a1a;
        page-break-after: avoid;
    }

    h1 {
        font-family: 'Playfair Display', serif;
        font-size: 24pt;
        font-weight: 700;
        margin-top: 0;
        margin-bottom: 6mm;
        border-bottom: 1px solid #eaeaea;
        padding-bottom: 3mm;
    }

    h2 {
        font-family: 'Playfair Display', serif;
        font-size: 17pt;
        font-weight: 600;
        margin-top: 10mm;
        margin-bottom: 4mm;
    }

    h3 {
        font-family: 'Inter', sans-serif;
        font-size: 12pt;
        font-weight: 600;
        margin-top: 8mm;
        margin-bottom: 3mm;
        color: #333;
    }

    p {
        margin-top: 0;
        margin-bottom: 4mm;
        text-align: justify;
    }

    /* Executive Summary / Cards */
    pre, code {
        font-family: monospace;
    }

    /* Custom Bordered Metrics Card */
    .summary-card {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 6mm 8mm;
        margin-bottom: 8mm;
        background-color: #fafafa;
        page-break-inside: avoid;
    }

    .summary-title {
        font-family: 'Inter', sans-serif;
        font-size: 8.5pt;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888888;
        margin-bottom: 4mm;
        border-bottom: 1px solid #eaeaea;
        padding-bottom: 1.5mm;
    }

    .summary-line {
        font-size: 10pt;
        margin-bottom: 2.5mm;
        display: flex;
        justify-content: space-between;
    }

    .summary-line:last-child {
        margin-bottom: 0;
    }

    /* Tables */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 8mm;
        font-size: 9.5pt;
        page-break-inside: avoid;
    }

    th, td {
        padding: 3mm 4mm;
        text-align: left;
        border-bottom: 1px solid #eaeaea;
    }

    th {
        font-weight: 600;
        color: #4a4a4a;
        background-color: #f7f7f7;
        border-top: 1px solid #eaeaea;
        text-transform: uppercase;
        font-size: 7.5pt;
        letter-spacing: 0.5px;
    }

    tr:nth-child(even) td {
        background-color: #fcfcfc;
    }

    /* Key Theme Cards */
    .theme-card {
        border-left: 3px solid #6366f1; /* Purple accent */
        padding-left: 5mm;
        margin-bottom: 6mm;
        page-break-inside: avoid;
    }

    .theme-title {
        font-weight: 600;
        font-size: 11.5pt;
        color: #1a1a1a;
        margin-bottom: 1.5mm;
    }

    /* Strengths & Challenges Lists */
    ul {
        margin-top: 0;
        margin-bottom: 6mm;
        padding-left: 6mm;
    }

    li {
        margin-bottom: 2mm;
    }

    /* Blockquote style callouts */
    blockquote {
        margin: 6mm 0;
        padding: 4mm 6mm;
        background-color: #f5f3ff; /* Very soft purple */
        border-left: 3px solid #8b5cf6;
        border-radius: 0 6px 6px 0;
        font-style: italic;
        color: #4c1d95;
        page-break-inside: avoid;
    }

    blockquote p {
        margin: 0;
        text-align: left;
    }

    /* Poetry summary */
    .poetry-box {
        border-top: 1px solid #e0e0e0;
        border-bottom: 1px solid #e0e0e0;
        padding: 8mm 6mm;
        margin: 10mm 0;
        text-align: center;
        font-family: 'Playfair Display', serif;
        font-size: 12pt;
        line-height: 1.7;
        color: #333333;
        font-style: italic;
        page-break-inside: avoid;
    }

    .page-break {
        page-break-after: always;
    }
</style>
</head>
<body>

    <!-- Cover Page -->
    <div class="cover-page">
        <h1 class="cover-title">Your Astrological<br>Cosmic Blueprint</h1>
        <p class="cover-subtitle">A Premium Personalized Vedic Reading</p>
        
        <div class="cover-meta-box">
            <div class="meta-grid">
                <div class="meta-item">
                    <div class="meta-label">Prepared For</div>
                    <div class="meta-value">{{ metadata.name }}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Date of Analysis</div>
                    <div class="meta-value">{{ metadata.analysis_date }}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Birth Date & Time</div>
                    <div class="meta-value">{{ metadata.birth_date }} at {{ metadata.birth_time }}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Birth Location</div>
                    <div class="meta-value">{{ metadata.birth_location }}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content-section">
        {{ content_html | safe }}
    </div>

</body>
</html>
