events {
    worker_connections 1024;
}

http {
    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name ather-os.de5.net;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server Block
    server {
        listen 443 ssl;
        server_name ather-os.de5.net;

        ssl_certificate /etc/letsencrypt/live/ather-os.de5.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ather-os.de5.net/privkey.pem;

        # SSL security optimizations
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Next.js Frontend (Default)
        location / {
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Support WebSockets (Next.js HMR/Dev reload)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # FastAPI Backend API Route Matching
        location ~ ^/(auth|users|workspaces|chats|folders|files|astrology|location|health|docs|redoc|openapi.json|profiles) {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Optimize for Server-Sent Events (SSE) streaming (e.g. astrology/chats streaming)
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_cache off;
            proxy_buffering off;
            chunked_transfer_encoding on;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
